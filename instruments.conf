# ============================================================================
# instruments.conf — REGISTRU CENTRAL de instrumente (provider + symbol + params).
# Multi-consumator: monitortrades (mt.*), tradeall (tradeall.*), rtrade (rtrade.*).
# Fiecare bot citeste CORE + namespace-ul lui; restul le ignora.
#
# CORE per sectiune:
#   provider      = binance | hyperliquid | (viitor) kraken | t212
#   symbol        = symbolul NATIV al venue-ului (HYPEUSDC pe HL, HYPEUSD pe Kraken...)
#   base / quote  = activul / moneda de cotare (free_balance e pe `base`)
#   enabled       = yes/no — instrumentul e activ
#   isolation     = dedicated (cont doar al botului) | own_ledger (sold partajat,
#                   vinde doar ce a cumparat botul). NEFOLOSIT inca (intra in vigoare
#                   cand bucla trademonitor citeste de aici — pasul 4).
#   market_hours  = 24x7 | rth (regular trading hours, pt actiuni)
#
# params mt.* OGLINDESC monitortrades.conf (behavior-preserving):
#   mt.gain/lost/maxage_days = pragul gain% / lost% / fereastra zile
#   mt.hardtp/hardtp_fraction/hardtp_cooldown_h = TP dur
#   mt.ref = last (ultimul buy) | average (media pe maxage zile)
# ============================================================================

[BTC_BINANCE]
provider     = binance
symbol       = BTCUSDC
base         = BTC
quote        = USDC
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 7.0
mt.lost              = 3.3
mt.maxage_days       = 7
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last

[TAO_BINANCE]
provider     = binance
symbol       = TAOUSDC
base         = TAO
quote        = USDC
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 9.2
mt.lost              = 4.9
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last

# HYPE pe Hyperliquid SPOT. enabled=no + isolation=own_ledger: soldul spot HL e
# PARTAJAT cu piciorul long al DN-bot -> NU activa live pana la izolare (al 2-lea
# wallet HL = dedicated, sau own_ledger real). Vezi designul / memoria.
[HYPE_HL]
provider     = hyperliquid
symbol       = HYPEUSDC
base         = HYPE
quote        = USDC
enabled      = no
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 9.0
mt.lost              = 5.0
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last
