# ============================================================================
# instruments.conf — REGISTRU CENTRAL de instrumente (provider + symbol + params).
# Nume sectiune = PLATFORMA_SIMBOL (ex [BINANCE_BTC]). Multi-consumator: monitortrades
# (mt.*), tradeall (tradeall.*), rtrade (rtrade.*). Fiecare bot citeste CORE + namespace-ul lui.
#
# CORE:
#   provider      = binance | hyperliquid | kraken | t212
#   symbol        = symbolul NATIV al venue-ului (HYPEUSDC pe HL, HYPEUSD pe Kraken, *_US_EQ pe T212)
#   base / quote  = activul / moneda de cotare (free_balance e pe `base`)
#   enabled       = yes/no
#   isolation     = dedicated | own_ledger (vezi designul; nefolosit inca in bucla)
#   market_hours  = 24x7 | rth (actiuni: doar orele de piata)
# params mt.* = gain%/lost%/maxage_zile + hardtp/hardtp_fraction/hardtp_cooldown_h + ref(last|average)
# ============================================================================

[BINANCE_BTC]
provider     = binance
symbol       = BTCUSDC
base         = BTC
quote        = USDC
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 7.0
mt.lost              = 3.3
mt.maxage_days       = 7
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last

[BINANCE_TAO]
provider     = binance
symbol       = TAOUSDC
base         = TAO
quote        = USDC
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 9.2
mt.lost              = 4.9
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last

# HYPE pe Hyperliquid SPOT — enabled=no: soldul spot HL e PARTAJAT cu piciorul long al
# DN-bot -> NU activa live pana la izolare (al 2-lea wallet HL).
[HYPERLIQUID_HYPE]
provider     = hyperliquid
symbol       = HYPEUSDC
base         = HYPE
quote        = USDC
enabled      = no
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 9.0
mt.lost              = 5.0
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last

# HYPE pe KRAKEN — Kraken n-are DN. Ordine reale doar cu KRAKEN_LIVE_ORDERS=true.
# ⚠ free_balance(HYPE) = soldul tau Kraken (inclusiv HYPE manual).
[KRAKEN_HYPE]
provider     = kraken
symbol       = HYPEUSD
base         = HYPE
quote        = USD
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 9.0
mt.lost              = 5.0
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last
mt.buy_budget        = 200      # USD per cumparare -> qty = 100/pret (NU mai e hardcodat 1 HYPE)
mt.max_budget        = 700      # plafon expunere totala USD: nu cumpara daca pozitia >= 500

# STOCKS REALE pe Trading212 (model portofoliu, RTH). enabled=no: sunt tranzactionate de
# t212_bot (212trading/, STRAT_*). Declarate aici doar ca registru; NU le pune enabled=yes
# cat timp t212_bot le gestioneaza (dubla-gestiune). Ticker exact = T212_TICKER din config.
[T212_SPCX]
provider     = t212
symbol       = SPCX_US_EQ
base         = SPCX_US_EQ
quote        = USD
enabled      = no
isolation    = own_ledger
market_hours = rth
mt.gain        = 8.0
mt.lost        = 5.0
mt.maxage_days = 30
mt.ref         = last

