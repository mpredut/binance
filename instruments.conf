# ============================================================================
# instruments.conf — REGISTRU CENTRAL de instrumente (provider + symbol + params).
# Nume sectiune = PLATFORMA_SIMBOL (ex [BINANCE_BTC]). Gandit multi-consumator
# (mt.* pt monitortrades, tradeall.*/rtrade.* rezervate pt viitor), dar 23 iul:
# verificat prin grep — azi SINGURUL consumator real e monitortrades.py
# (load_for("mt")). tradeall.py/rtrade.py au propriile *_config.env separate.
#
# CORE:
#   provider      = binance | hyperliquid | kraken | t212
#   symbol        = symbolul NATIV al venue-ului (HYPEUSDC pe HL, HYPEUSD pe Kraken, *_US_EQ pe T212)
#   base / quote  = activul / moneda de cotare (free_balance e pe `base`)
#   enabled       = yes/no
#   isolation     = dedicated | own_ledger (vezi designul; nefolosit inca in bucla)
#   market_hours  = 24x7 | rth (actiuni: doar orele de piata)
# params mt.* = gain%/lost%/maxage_zile + hardtp/hardtp_fraction/hardtp_cooldown_h + ref(last|average)
# ============================================================================

[BINANCE_BTC]
provider     = binance
symbol       = BTCUSDC
base         = BTC
quote        = USDC
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
# BACKTEST: 5.0, 7.0, 8.0, 9.0
mt.gain              = 7.0
# BACKTEST: 2.3, 3.3, 3.8, 4.3
mt.lost              = 3.3
mt.maxage_days       = 7
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last
# 23 iul: buy_budget/max_budget adaugate dupa backtest pe replay (research/
# monitortrades_backtest/) — FARA ele, "buy again" din monitor_price_and_trade
# cumpara qty=1 (1 BTC intreg, ~$65-111k in istoricul testat) fara niciun plafon
# total. buy_budget=250 controleaza marimea per-cumparare (Kraken HYPE are deja
# acelasi tipar); max_budget=3500 = validat pe TAO (net -$45 vs buy&hold -$420,
# toate ciclurile inchise corect) dupa o medie intre valoarea gasita prin
# backtest (~2000, zona stabila 1500-3000) si valoarea propusa (5000, care
# singura a dat net -$5279 cu 0 vanzari — pozitie ramasa blocata).
mt.buy_budget        = 250
mt.max_budget        = 3500

[BINANCE_TAO]
provider     = binance
symbol       = TAOUSDC
base         = TAO
quote        = USDC
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
# BACKTEST: 7.5, 9.2, 10.5, 12.0
mt.gain              = 9.2
# BACKTEST: 3.9, 4.9, 5.6, 6.3
mt.lost              = 5.25
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.buy_budget        = 250
mt.max_budget        = 3500
mt.ref               = last

# HYPE pe Hyperliquid SPOT — enabled=no: soldul spot HL e PARTAJAT cu piciorul long al
# DN-bot -> NU activa live pana la izolare (al 2-lea wallet HL).
[HYPERLIQUID_HYPE]
provider     = hyperliquid
symbol       = HYPEUSDC
base         = HYPE
quote        = USDC
enabled      = no
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 9.0
mt.lost              = 5.0
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
mt.ref               = last

# HYPE pe KRAKEN — Kraken n-are DN. Ordine reale doar cu KRAKEN_LIVE_ORDERS=true.
# ⚠ free_balance(HYPE) = soldul tau Kraken (inclusiv HYPE manual).
[KRAKEN_HYPE]
provider     = kraken
symbol       = HYPEUSD
base         = HYPE
quote        = USD
enabled      = yes
isolation    = own_ledger
market_hours = 24x7
mt.gain              = 9.0
mt.lost              = 5.0
mt.maxage_days       = 17
mt.hardtp            = 17
mt.hardtp_fraction   = 0.5
mt.hardtp_cooldown_h = 6
# 23 iul: mt.buy_budget/mt.max_budget de mai jos aveau comentarii INLINE (pe
# aceeasi linie cu valoarea) — configparser NU le taie by default (doar
# comentariile pe linie proprie), deci valoarea parsata era literal string-ul
# "200      # USD per cumparare..." -> float() esua -> cade pe default (None,
# adica FARA protectie reala) de cand a fost scris acest fisier. Reparat prin
# mutarea comentariilor pe linii proprii (convenia restului fisierului).
# USD per cumparare -> qty = buget/pret (NU mai e hardcodat 1 HYPE)
mt.ref               = last
mt.buy_budget        = 200
# plafon expunere totala USD: nu cumpara daca pozitia >= 500
mt.max_budget        = 700

# STOCKS REALE pe Trading212 (model portofoliu, RTH). enabled=no: sunt tranzactionate de
# t212_bot (212trading/, STRAT_*). Declarate aici doar ca registru; NU le pune enabled=yes
# cat timp t212_bot le gestioneaza (dubla-gestiune). Ticker exact = T212_TICKER din config.
[T212_SPCX]
provider     = t212
symbol       = SPCX_US_EQ
base         = SPCX_US_EQ
quote        = USD
enabled      = no
isolation    = own_ledger
market_hours = rth
mt.gain        = 8.0
mt.lost        = 5.0
mt.maxage_days = 30
mt.ref         = last

