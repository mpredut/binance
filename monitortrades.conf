# ============================================================================
# monitortrades.conf — parametri GLOBALI reglabili pt monitortrades.py. Text simplu.
# Lipsa fisierului SAU a unei chei => se folosesc valorile implicite din cod.
#
# 23 iul: eliminate liniile per-simbol (SIMBOL = gain%/lost%/maxage_zile) care
# erau aici — se parsau dar NU se citeau niciodata (SYMBOL_PARAMS mort, confirmat
# prin grep). Sursa REALA per-instrument e instruments.conf (namespace mt.*,
# sectiunile [BINANCE_BTC]/[BINANCE_TAO]/etc, mt.gain/mt.lost/mt.maxage_days) —
# editeaza acolo, nu aici, ca sa schimbi gain/lost/maxage per simbol.
# ============================================================================

# --- TP DUR (vinde o proportie pe castig mare, INDIFERENT de trend) ---
# hard_tp_pct/fraction/cooldown_h de mai jos sunt FALLBACK global — folosite
# doar de instrumentele din instruments.conf care NU seteaza mt.hardtp*
# (azi: BTC/TAO/HYPE le seteaza explicit; T212_SPCX/NVDA/RGNT NU, deci ar
# folosi aceste valori daca ar fi enabled=yes).
hard_tp_enabled    = yes
hard_tp_pct        = 17     # % castig vs referinta de la care declanseaza
hard_tp_fraction   = 0.5    # cat vinde (0.5 = 50% din soldul liber)
hard_tp_cooldown_h = 6      # ore minime intre doua TP-uri dure

# --- Referinta de pret pt castig: last (ultimul buy) | average (media pe maxage zile) ---
tp_reference = last
