# trailing.conf — config trailing stop Kraken (kraken/trailing_stop.py)
# Modifica AICI; nu mai pune variabile in bots_start.sh / healthcheck.sh.
# ENV var setat din exterior SUPRASCRIE config-ul (pt test ad-hoc: KRAKEN_TRAILING_ENABLED=false python3 ...).

KRAKEN_TRAILING_ENABLED=true
KRAKEN_TRAILING_CHECK_SECONDS=120

# Re-buy dupa stop-loss de crash (ca pe Binance): recumpara cand pretul revine BOUNCE_PCT%
# de la minimul de dupa vanzare (confirma ca s-a oprit caderea -> nu prinde cutitul).
KRAKEN_TRAILING_REBUY_ENABLED=true
KRAKEN_TRAILING_REBUY_BOUNCE_PCT=1.2

# Filtre de trend instant HYPE (citite din cachedb/cache_instant_trend.json; 0/neutru -> no-op sigur)
# REBUY_SKIP_IF_TREND_DOWN=true  -> nu recumpara cand trend clar jos (nu prinde cutitul)
# SELL_SKIP_IF_TREND_UP=false    -> disjunctorul de crash ramane NECONDITIONAT (recomandat);
#                                   true = anti-wick (nu vinde daca trend instant clar sus)
KRAKEN_TRAILING_REBUY_SKIP_IF_TREND_DOWN=true
KRAKEN_TRAILING_SELL_SKIP_IF_TREND_UP=false

# Prag minim de profit (%) inainte sa se activeze trailing-ul.
# 0 = activ imediat dupa cumparare (comportament vechi).
# 5 = trailing porneste abia cand pretul e cu 5% peste pretul initial observat.
# Previne vanzarea in pierdere pe un dip normal din primele zile dupa cumparare.
KRAKEN_TRAILING_MIN_PROFIT_PCT=5.0
