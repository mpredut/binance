# ============================================================================
# market_alerts.conf — config pt monitorul de alerte (monede noi + praguri pret).
# Text simplu, o linie = o setare.  # = comentariu (si inline).
# ============================================================================

# --- Watchlist: monede urmarite mereu ---
watch = BTC, TAO, HYPE

# --- Surse pt descoperirea de monede noi ---
sources = coinmarketcap, coingecko

# --- Praguri de alerta:  NUME = UP% / DOWN% ---
#   UP%   = alerta cand pretul a URCAT cu X% fata de MINIMUL pe 24h
#   DOWN% = alerta cand pretul a SCAZUT cu X% fata de MAXIMUL pe 24h
default  = 4.1 / 7.5      # monedele normale (fara prag propriu)
new_coin = 12 / 25        # monede nou-descoperite (pana modelul sugereaza altceva)

# --- Praguri PER-MONEDA (suprascriu default-ul). Format:  SIMBOL = UP / DOWN ---
BTC = 6 / 10
# ETH = 5 / 9            # decomenteaza ca sa adaugi inca una
# HYPE = 9 / 18

# --- Setari generale ---
cooldown_minutes       = 30     # nu repeta aceeasi alerta mai des de atat
lookback_hours         = 24     # fereastra de analiza a pretului
max_monitored          = 20     # cate monede max in watchlist
max_new_coins          = 15     # cate monede noi urmarim
new_coins_scan_seconds = 3600   # cat de des cautam monede noi
price_scan_seconds     = 60     # cat de des verificam preturile
