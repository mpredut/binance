# order_guard.conf — pragul MINIM de profit (%) pentru gardul de profit, per venue.
# Citit de order_guard.margin_for(provider). Format:  <provider> = <procent>
# (nume lowercase ca la provider.name; 'default' = fallback cand venue-ul nu e listat).
# Lipsa fisierului / valoare invalida -> default 1.15 (fail-safe). Modificarea cere
# restart bot (valoarea e cache-uita la prima citire).

default = 1.15
binance = 1.15
kraken  = 1.15

# Fereastra (ore) pt tier-ul min/max time-windowed, per venue: cheia <venue>_window_h.
# La un BUY -> min(sell) din fereastra; la SELL -> max(buy). 0 = fara tier (doar ultimul
# fill opus). Binance NU foloseste asta (are gard intern in bapi cu Order cache propriu).
default_window_h = 0
kraken_window_h  = 48

# Proxy de trend pt WEIGHT (gauss) cand symbol-ul n-are trend LUNG propriu (ex HYPEUSD pe
# Kraken pana se calculeaza trendul lui). Foloseste curba gauss a altui symbol (BTC = beta
# de piata). Cheia <venue>_weight_proxy sau default_weight_proxy. Fara proxy -> default 0.03.
kraken_weight_proxy = BTCUSDC
