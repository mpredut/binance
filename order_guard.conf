# order_guard.conf — pragul MINIM de profit (%) pentru gardul de profit, per venue.
# Citit de order_guard.margin_for(provider). Format:  <provider> = <procent>
# (nume lowercase ca la provider.name; 'default' = fallback cand venue-ul nu e listat).
# Lipsa fisierului / valoare invalida -> default 1.15 (fail-safe). Modificarea cere
# restart bot (valoarea e cache-uita la prima citire).

default = 1.15
binance = 1.15
kraken  = 1.15
