# trailing.conf — config trailing stop Binance (binance_api/trailing_stop.py)
# Modifica AICI; nu mai pune variabile in bots_start.sh.
# ENV var setat din exterior SUPRASCRIE config-ul (pt test ad-hoc: TRAILING_ENABLED=false python3 ...).

TRAILING_ENABLED=true
TRAILING_SELL_FRACTION=1.0
TRAILING_CHECK_SECONDS=60

# Re-buy dupa stop-loss de crash: recumpara cand pretul revine BOUNCE_PCT% de la minimul de dupa vanzare
TRAILING_REBUY_ENABLED=true
TRAILING_REBUY_BOUNCE_PCT=1.2
TRAILING_REBUY_TRANCHES=1

# Filtre de trend instant (citite din cache_instant_trend via cacheManager)
# REBUY_SKIP_IF_TREND_DOWN=true  -> nu recumpara cand trend clar jos (nu prinde cutitul)
# SELL_SKIP_IF_TREND_UP=false    -> disjunctorul de crash ramane NECONDITIONAT (recomandat)
#                                   pune true daca vrei anti-wick (nu vinde daca trend instant sus)
TRAILING_REBUY_SKIP_IF_TREND_DOWN=true
TRAILING_SELL_SKIP_IF_TREND_UP=false

# Prag minim de profit (%) inainte sa se activeze trailing-ul.
# 0 = activ imediat dupa cumparare (comportament vechi).
# 5 = trailing porneste abia cand pretul e cu 5% peste pretul initial observat.
# Previne vanzarea in pierdere pe un dip normal din primele zile dupa cumparare.
TRAILING_MIN_PROFIT_PCT=5.0
