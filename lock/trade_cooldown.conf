# trade_cooldown.conf — config pentru gate-ul anti rapid-fire de ordine.
# Text (ini), NU json. Editabil fără a atinge codul; se citește la import.
#
# default_sec = secunde minime între două ordine pe ACELAȘI simbol (orice
#               combinație BUY/BUY, SELL/SELL, BUY/SELL). Mai mare = mai
#               conservator; mai mic = reacție mai rapidă. Dacă fișierul sau
#               cheia lipsesc, codul cade pe fallback-ul intern.
[cooldown]
default_sec = 20
