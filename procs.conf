# procs.conf — INVENTARUL UNIC de procese supravegheate (boti + flota).
# SINGURA sursa de adevar. Citit de:  bots_start.sh, flota_start.sh, healthcheck.sh.
# Adaugi / scoti / modifici un proces -> AICI, intr-un SINGUR loc (nu mai in 3).
#
# Format (campuri separate cu '|'):  pat | dir | start_cmd | label | hb_log | hb_stale_s | role
#   pat        - pattern pgrep -f (procesul). '$' la final = cmdline se termina acolo.
#   dir        - director de lucru pt pornire ($ROOT expandat de fiecare consumator).
#   start_cmd  - comanda de pornire (rulata prin eval, fara 'cd' — consumatorul face cd in dir;
#                $ROOT/$VENV se expandeaza la rulare). Pt role=fleet poate fi GOL (vezi mai jos).
#   label      - nume scurt (loguri/alerte + cheie backoff).
#   hb_log     - HEARTBEAT optional (relativ la dir): log a carui mtime arata ca procesul "bate".
#                Gol = doar verificare de prezenta (pgrep).
#   hb_stale_s - prag secunde: proces viu DAR log mai vechi de atat = HUNG. Gol = fara heartbeat.
#   role       - bot   : pornit de bots_start.sh; repornit (absent/HUNG) de healthcheck --supervise.
#                fleet : pornit + supravegheat de flota_start.sh (bucla proprie, venv + logs/);
#                        healthcheck DOAR alerteaza (nu reporneste). Pt fleet, start_cmd e GOL —
#                        flota_start stie sa porneasca scriptul ($pat) cu logica ei.
#
# ORDINEA conteaza la pornire (ex.: kraken_cachemanager INAINTEA kraken_bot, ca fisierul de fills sa existe).
# Liniile care incep cu '#' si cele goale sunt ignorate. NU indenta campurile.

# ---- BOTI (role=bot) ----
dn_bot.py$|$ROOT/hyperliquid|source $ROOT/$VENV/bin/activate && nohup python3 dn_bot.py >> dn_bot.log 2>&1 &|DN-bot|dn_bot.log|600|bot
dn_bot.py --watch|$ROOT/hyperliquid|source $ROOT/$VENV/bin/activate && nohup python3 dn_bot.py --watch >> dn_watch.log 2>&1 &|DN-watch|dn_watch.log|600|bot
# Heartbeat-uri: cadenta pe NOAPTE verificata (14 iul: kraken_cache ~30s, kraken_bot ~2min,
# t212_bot ~10s, trail_k ~2min, xstock ~3min) -> praguri cu marja 5-10x. Binance-trailing
# NU are heartbeat INTENTIONAT: stdout-ul lui e block-buffered (mtime poate sta ORE in urma)
# -> ar da fals-HUNG si restart degeaba; ramane doar pe prezenta (pgrep).
kraken_cachemanager.py|$ROOT/kraken|nohup python3 kraken_cachemanager.py >> kraken_cachemanager.log 2>&1 &|Kraken-cache|kraken_cachemanager.log|600|bot
kraken_bot.py|$ROOT/kraken|nohup python3 kraken_bot.py >> kraken_bot.log 2>&1 &|Kraken-bot|kraken_bot.log|900|bot
kraken_xstock_watch.py|$ROOT/kraken|nohup python3 kraken_xstock_watch.py >> kraken_xstock_watch.log 2>&1 &|xStock-watch|kraken_xstock_watch.log|1800|bot
t212_bot.py|$ROOT/212trading|nohup python3 t212_bot.py >> t212_bot.log 2>&1 &|T212-bot|t212_bot.log|900|bot
kraken/trailing_stop.py|$ROOT|nohup python3 kraken/trailing_stop.py >> kraken/trail_k.log 2>&1 &|Kraken-trailing|kraken/trail_k.log|900|bot
binance_api/trailing_stop.py|$ROOT|source $ROOT/$VENV/bin/activate && nohup python3 binance_api/trailing_stop.py >> binance_api/trail_b.log 2>&1 &|Binance-trailing|||bot

# ---- FLOTA (role=fleet) — pornita+supravegheata de flota_start; healthcheck doar alerteaza ----
cacheManager.py|$ROOT||cacheManager|||fleet
assetguardian.py|$ROOT||assetguardian|||fleet
priceAnalysis.py|$ROOT||priceAnalysis|||fleet
tradeall.py|$ROOT||tradeall|||fleet
monitortrades.py|$ROOT||monitortrades|||fleet
rtrade.py|$ROOT||rtrade|||fleet
market_alerts.py|$ROOT||market_alerts|||fleet
